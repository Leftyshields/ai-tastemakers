name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "briefings/**"
      - "data/subscribers.json"
      - "scripts/build-pages.ts"
      - "firebase/**"
      - "site/assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm install

      - name: Build site
        run: npm run build:pages
        env:
          FIREBASE_PROJECT_ID: epiphoric-prod
          FIREBASE_AUTH_DOMAIN: epiphoric-prod.firebaseapp.com
          # Public web app keys (safe to commit) — epiphoric-prod Firebase console
          FIREBASE_API_KEY: AIzaSyBWU5eZCR150Vn92dm4ARo0kwG95f2qeIw
          FIREBASE_APP_ID: 1:174389116874:web:d7cf9bda6e20bf0d2e5933

      - name: Verify CSS artifact
        run: test -s site/assets/style.css && test "$(wc -c < site/assets/style.css)" -gt 1000

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
