name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "briefings/**"
      - "data/subscribers.json"
      - "data/tool-inventory.json"
      - "data/experiments/*.json"
      - "scripts/build-pages.ts"
      - "scripts/edition-pages.ts"
      - "scripts/index-layout-helpers.ts"
      - "firebase/**"
      - "site/assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm install

      - name: Build site
        run: npm run build:pages
        env:
          FIREBASE_PROJECT_ID: epiphoric-prod
          FIREBASE_AUTH_DOMAIN: epiphoric-prod.firebaseapp.com
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          # Set to "1" at EXP-20260701-landing-layout treatment start (2026-08-01)
          SITE_LANDING_LAYOUT_V2: ${{ vars.SITE_LANDING_LAYOUT_V2 }}

      - name: Verify CSS artifact
        run: test -s site/assets/style.css && test "$(wc -c < site/assets/style.css)" -gt 1000

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry Pages deployment (transient GitHub 500s)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4

      - name: Fail if Pages deployment did not succeed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed after retry. Re-run this workflow manually."
          exit 1
