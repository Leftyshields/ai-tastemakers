name: Daily Digest

on:
  schedule:
    # 06:00 America/Los_Angeles (PDT = 13:00 UTC; PST = 14:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm install

      - name: Run digest (OSS + Skills)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          DIGEST_SITE_URL: https://leftyshields.github.io/ai-tastemakers
          FIREBASE_PROJECT_ID: epiphoric-prod
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          npm run digest -- --edition oss
          npm run digest -- --edition skills

      - name: Run weekly wrap-up (Sundays)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "$(TZ=America/Los_Angeles date +%u)" -eq 7 ]; then
            npm run weekly
          else
            echo "Not Sunday in America/Los_Angeles — skipping weekly wrap-up"
          fi

      - name: Commit briefing
        env:
          TZ: America/Los_Angeles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/ data/snapshots/
          if git diff --staged --quiet; then
            echo "No briefing changes to commit"
            exit 0
          fi
          git commit -m "chore: daily digest $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
