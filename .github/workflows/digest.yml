name: Daily Digest

on:
  schedule:
    # Primary + backup slots (America/Los_Angeles). GitHub cron is best-effort and
    # often drops :00 UTC jobs; off-minute + timezone + retries improve reliability.
    - cron: "17 6 * * *"
      timezone: "America/Los_Angeles"
    - cron: "45 6 * * *"
      timezone: "America/Los_Angeles"
    - cron: "30 7 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4

      - name: Determine what to run
        id: gate
        run: |
          TODAY=$(TZ=America/Los_Angeles date +%Y-%m-%d)
          echo "date=${TODAY}" >> "$GITHUB_OUTPUT"

          if [ -f "briefings/${TODAY}/digest.json" ] && [ -f "briefings/skills/${TODAY}/digest.json" ]; then
            echo "skip_daily=true" >> "$GITHUB_OUTPUT"
            echo "Daily briefings for ${TODAY} already exist — skipping digest pipeline"
          else
            echo "skip_daily=false" >> "$GITHUB_OUTPUT"
          fi

          RUN_WEEKLY=false
          if [ "$(TZ=America/Los_Angeles date +%u)" -eq 7 ]; then
            WEEK_ID=$(TZ=America/Los_Angeles date +%G-W%V)
            echo "week_id=${WEEK_ID}" >> "$GITHUB_OUTPUT"
            if [ ! -f "briefings/weekly/${WEEK_ID}/weekly_review.json" ]; then
              RUN_WEEKLY=true
              echo "Weekly review for ${WEEK_ID} missing — will run wrap-up"
            else
              echo "Weekly review for ${WEEK_ID} already exists"
            fi
          fi
          echo "run_weekly=${RUN_WEEKLY}" >> "$GITHUB_OUTPUT"

          if [ "${RUN_WEEKLY}" = "false" ] && [ -f "briefings/${TODAY}/digest.json" ] && [ -f "briefings/skills/${TODAY}/digest.json" ]; then
            echo "Nothing to do — daily and weekly (if applicable) already published"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip_daily != 'true' || steps.gate.outputs.run_weekly == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.skip_daily != 'true' || steps.gate.outputs.run_weekly == 'true'
        run: npm install

      - name: Run digest (OSS + Skills)
        if: steps.gate.outputs.skip_daily != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
          DIGEST_SITE_URL: https://leftyshields.github.io/ai-tastemakers
          FIREBASE_PROJECT_ID: epiphoric-prod
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          npm run digest -- --edition oss
          npm run digest -- --edition skills

      - name: Run weekly wrap-up (Sundays)
        if: steps.gate.outputs.run_weekly == 'true'
        continue-on-error: ${{ steps.gate.outputs.skip_daily != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run weekly

      - name: Commit briefing
        id: commit
        if: steps.gate.outputs.skip_daily != 'true' || steps.gate.outputs.run_weekly == 'true'
        env:
          TZ: America/Los_Angeles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/ data/snapshots/
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No briefing changes to commit"
            exit 0
          fi
          if [ "${{ steps.gate.outputs.skip_daily }}" = "true" ]; then
            git commit -m "chore: weekly wrap-up ${{ steps.gate.outputs.week_id }}"
          else
            git commit -m "chore: daily digest $(date +%Y-%m-%d)"
          fi
          git pull --rebase origin main
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy GitHub Pages
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy GitHub Pages" --ref main
