name: Daily Digest

on:
  schedule:
    # Primary + backup slots (America/Los_Angeles). GitHub cron is best-effort and
    # often drops :00 UTC jobs; off-minute + timezone + retries improve reliability.
    - cron: "17 6 * * *"
      timezone: "America/Los_Angeles"
    - cron: "45 6 * * *"
      timezone: "America/Los_Angeles"
    - cron: "30 7 * * *"
      timezone: "America/Los_Angeles"
    - cron: "0 8 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:
    inputs:
      resend_email:
        description: Resend OSS digest email from today's briefing (when pipeline is skipped)
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4

      - name: Determine what to run
        id: gate
        run: |
          TODAY=$(TZ=America/Los_Angeles date +%Y-%m-%d)
          echo "date=${TODAY}" >> "$GITHUB_OUTPUT"

          if [ -f "briefings/${TODAY}/digest.json" ] && [ -f "briefings/skills/${TODAY}/digest.json" ]; then
            echo "skip_daily=true" >> "$GITHUB_OUTPUT"
            echo "Daily briefings for ${TODAY} already exist — skipping digest pipeline (no email unless resend_email is checked)"
          else
            echo "skip_daily=false" >> "$GITHUB_OUTPUT"
          fi

          node scripts/sunday-wrap-gate.mjs >> "$GITHUB_OUTPUT"

          if [ "$(grep '^run_weekly=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)" = "true" ]; then
            echo "Sunday weekly wrap-up will run if gate passed"
          fi
          if [ "$(grep '^run_monthly=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)" = "true" ]; then
            echo "Fourth-Sunday monthly rollup will run if gate passed"
          fi
          if [ "$(grep '^is_sunday=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)" = "true" ]; then
            echo "Sunday tool inventory refresh will run after wrap-up (or alone if briefings already published)"
          fi

          if [ "$(grep '^run_weekly=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)" = "false" ] && [ "$(grep '^run_monthly=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)" = "false" ] && [ "$(grep '^is_sunday=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)" = "false" ] && [ -f "briefings/${TODAY}/digest.json" ] && [ -f "briefings/skills/${TODAY}/digest.json" ]; then
            echo "Nothing to do — daily and wrap-up (if applicable) already published"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip_daily != 'true' || steps.gate.outputs.run_weekly == 'true' || steps.gate.outputs.run_monthly == 'true' || steps.gate.outputs.is_sunday == 'true' || inputs.resend_email == true
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.skip_daily != 'true' || steps.gate.outputs.run_weekly == 'true' || steps.gate.outputs.run_monthly == 'true' || steps.gate.outputs.is_sunday == 'true' || inputs.resend_email == true
        run: npm install

      - name: Resend digest email from existing briefing
        if: inputs.resend_email == true && steps.gate.outputs.skip_daily == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
          DIGEST_SITE_URL: https://leftyshields.github.io/ai-tastemakers
          FIREBASE_PROJECT_ID: epiphoric-prod
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: npm run digest:resend-email

      - name: Run digest (OSS + Skills)
        if: steps.gate.outputs.skip_daily != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
          DIGEST_SITE_URL: https://leftyshields.github.io/ai-tastemakers
          FIREBASE_PROJECT_ID: epiphoric-prod
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          # EXP-20260628-web-enrich-skills treatment (through 2026-07-26)
          DIGEST_ENRICH_WEB: "1"
          DIGEST_ENRICH_SHADOW: "0"
        run: |
          npm run digest -- --edition oss
          npm run digest -- --edition skills

      - name: Run monthly rollup (fourth Sunday)
        if: steps.gate.outputs.run_monthly == 'true'
        continue-on-error: ${{ steps.gate.outputs.skip_daily != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run monthly

      - name: Run weekly wrap-up (Sundays)
        if: steps.gate.outputs.run_weekly == 'true'
        continue-on-error: ${{ steps.gate.outputs.skip_daily != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run weekly

      - name: Refresh tool inventory (Sundays)
        if: steps.gate.outputs.is_sunday == 'true'
        run: npm run inventory:tools

      - name: Commit briefing and tool inventory
        id: commit
        if: steps.gate.outputs.skip_daily != 'true' || steps.gate.outputs.run_weekly == 'true' || steps.gate.outputs.run_monthly == 'true' || steps.gate.outputs.is_sunday == 'true'
        env:
          TZ: America/Los_Angeles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/ data/snapshots/ data/tool-inventory.json
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No briefing or inventory changes to commit"
            exit 0
          fi
          INV_SUFFIX=""
          if [ "${{ steps.gate.outputs.is_sunday }}" = "true" ]; then
            INV_SUFFIX=" + tool inventory"
          fi
          if [ "${{ steps.gate.outputs.skip_daily }}" = "true" ] && [ "${{ steps.gate.outputs.run_weekly }}" != "true" ] && [ "${{ steps.gate.outputs.run_monthly }}" != "true" ] && [ "${{ steps.gate.outputs.is_sunday }}" = "true" ]; then
            git commit -m "chore: refresh tool inventory"
          elif [ "${{ steps.gate.outputs.skip_daily }}" = "true" ]; then
            if [ "${{ steps.gate.outputs.run_monthly }}" = "true" ]; then
              git commit -m "chore: monthly rollup ${{ steps.gate.outputs.month_id }}${INV_SUFFIX}"
            else
              git commit -m "chore: weekly wrap-up ${{ steps.gate.outputs.week_id }}${INV_SUFFIX}"
            fi
          elif [ "${{ steps.gate.outputs.run_monthly }}" = "true" ]; then
            git commit -m "chore: daily digest $(date +%Y-%m-%d) + monthly rollup ${{ steps.gate.outputs.month_id }}${INV_SUFFIX}"
          elif [ "${{ steps.gate.outputs.run_weekly }}" = "true" ]; then
            git commit -m "chore: daily digest $(date +%Y-%m-%d) + weekly wrap-up ${{ steps.gate.outputs.week_id }}${INV_SUFFIX}"
          else
            git commit -m "chore: daily digest $(date +%Y-%m-%d)${INV_SUFFIX}"
          fi
          git pull --rebase origin main
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy GitHub Pages
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy GitHub Pages" --ref main
